<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home Health</title>
  <style>
    :root { --bg:#f3f2ea; --card:#fff; --text:#2c3025; --muted:#7d8071; --line:#e6e4d6; --accent:#4a754c; }
    body { margin:0; background:var(--bg); color:var(--text); min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
    .card { text-align:center; padding:48px 30px; }
    .badge { width:72px; height:72px; border-radius:21px; background:var(--accent); color:#fff;
      display:flex; align-items:center; justify-content:center; font-size:38px; margin:0 auto 20px; }
    h1 { font-size:30px; margin:0 0 6px; letter-spacing:-0.01em; }
    p { color:var(--muted); margin:0 0 26px; }
    .links a { display:inline-block; margin:0 8px; padding:11px 20px; border-radius:999px;
      background:var(--card); border:1px solid var(--line); color:var(--accent);
      text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">✓</div>
    <h1>Home Health</h1>
    <p>Keep your home spotless — together.</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="support.html">Support</a>
    </div>
  </div>
</body>
</html>
